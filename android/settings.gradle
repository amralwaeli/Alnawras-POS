pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    // Lets Gradle auto-download the JDK 21 toolchain that the Capacitor 7
    // plugins require, so command-line builds work without manually installing
    // a JDK. (Needs internet on the first build; the JDK is then cached.)
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'